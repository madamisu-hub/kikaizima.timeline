<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイムライン</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

.timeline {
  max-width: 600px;
  margin: auto;
}

.event {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin: 10px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.time {
  font-weight: bold;
  font-size: 14px;
  color: #666;
}

.character {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
  margin: 5px 0;
}

.location {
  font-size: 12px;
  color: #888;
}

.action {
  margin-top: 5px;
}

.important {
  border-left: 5px solid red;
}
</style>

</head>
<body>

<h1>タイムライン</h1>
<div class="timeline" id="timeline"></div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

  const container = document.getElementById('timeline');

  const colorMap = {};
  data.characters.forEach(c => {
    colorMap[c.name] = c.color;
  });

  data.events.sort((a,b) => a.time.localeCompare(b.time));

  data.events.forEach(event => {

    const div = document.createElement('div');
    div.className = 'event';

    if(event.isImportant) {
      div.classList.add('important');
    }

    const colorClass = colorMap[event.character] || "bg-gray-500";

    const colorMapCSS = {
      "bg-red-500":"#ef4444",
      "bg-blue-500":"#3b82f6",
      "bg-yellow-500":"#eab308",
      "bg-orange-500":"#f97316",
      "bg-green-500":"#22c55e",
      "bg-purple-500":"#a855f7",
      "bg-gray-500":"#6b7280"
    };

    const color = colorMapCSS[colorClass] || "#999";

    div.innerHTML = `
      <div class="time">${event.time}</div>
      <div class="character" style="background:${color}">
        ${event.character}
      </div>
      <div class="location">${event.location}</div>
      <div class="action">${event.action}</div>
    `;

    container.appendChild(div);
  });

});
</script>

</body>
</html>
