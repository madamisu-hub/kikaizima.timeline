<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイムライン</title>

<style>
  .timeline {
  max-width: 600px;
  margin: auto;
  position: relative;
  padding-left: 30px;
}

/* 縦線 */
.timeline::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 0;
  width: 2px;
  height: 100%;
  background: #ccc;
}

/* 時間ブロック */
.time-block {
  position: relative;
  margin-bottom: 25px;
}

/* 丸（ポイント） */
.time-block::before {
  content: "";
  position: absolute;
  left: -22px;
  top: 5px;
  width: 10px;
  height: 10px;
  background: #666;
  border-radius: 50%;
}

/* 時間ヘッダー */
.time-header {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 8px;
}
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

.timeline {
  max-width: 600px;
  margin: auto;
}

/* 時間ブロック */
.time-block {
  margin-bottom: 20px;
}

/* 時間見出し */
.time-header {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 5px;
  color: #333;
}

/* イベントカード */
.event {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin: 5px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.character {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
}

.location {
  font-size: 12px;
  color: #888;
}

.details {
  font-size: 12px;
  color: #555;
}

.important {
  border-left: 5px solid red;
}
</style>

</head>
<body>

<h1>タイムライン</h1>
<div class="timeline" id="timeline"></div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

  const container = document.getElementById('timeline');

  // キャラ色
  const colorMap = {};
  data.characters.forEach(c => {
    colorMap[c.name] = c.color;
  });

  const colorMapCSS = {
    "bg-red-500":"#ef4444",
    "bg-blue-500":"#3b82f6",
    "bg-yellow-500":"#eab308",
    "bg-orange-500":"#f97316",
    "bg-green-500":"#22c55e",
    "bg-purple-500":"#a855f7",
    "bg-gray-500":"#6b7280"
  };

  // 時間変換関数
  function convertTime(time) {
    let [h, m] = time.split(':').map(Number);

    if (h < 6) {  // 深夜扱い（調整OK）
      h += 24;
    }

    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  // グループ化
  const groups = {};

  data.events.forEach(event => {
    const newTime = convertTime(event.time);

    if (!groups[newTime]) {
      groups[newTime] = [];
    }

    groups[newTime].push(event);
  });

  // 時間順ソート
  const sortedTimes = Object.keys(groups).sort();

  sortedTimes.forEach(time => {

    const block = document.createElement('div');
    block.className = 'time-block';

    // 時間ヘッダー
    const header = document.createElement('div');
    header.className = 'time-header';
    header.textContent = time;

    block.appendChild(header);

    // 各イベント
    groups[time].forEach(event => {

      const div = document.createElement('div');
      div.className = 'event';

      if(event.isImportant) {
        div.classList.add('important');
      }

      const colorClass = colorMap[event.character] || "bg-gray-500";
      const color = colorMapCSS[colorClass] || "#999";

      div.innerHTML = `
        <div class="character" style="background:${color}">
          ${event.character}
        </div>
        <div class="location">${event.location}</div>
        <div>${event.action}</div>
        <div class="details">${event.details || ''}</div>
      `;

      block.appendChild(div);
    });

    container.appendChild(block);
  });

});
</script>

</body>
</html>
