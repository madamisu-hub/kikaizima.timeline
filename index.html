<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイムライン</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* ナビ */
#time-nav {
  max-width: 600px;
  margin: 10px auto 20px;
  text-align: center;
}

#time-nav a {
  display: inline-block;
  margin: 3px;
  padding: 5px 8px;
  background: #ddd;
  border-radius: 5px;
  text-decoration: none;
  color: #333;
  font-size: 12px;
}

#time-nav a:hover {
  background: #bbb;
}

/* タイムライン */
.timeline {
  max-width: 600px;
  margin: auto;
  position: relative;
  padding-left: 30px;
}

.timeline::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 0;
  width: 2px;
  height: 100%;
  background: #ccc;
}

.time-block {
  position: relative;
  margin-bottom: 25px;
}

.time-block::before {
  content: "";
  position: absolute;
  left: -22px;
  top: 5px;
  width: 10px;
  height: 10px;
  background: #666;
  border-radius: 50%;
}

.time-header {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 8px;
}

/* イベント */
.event {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin: 5px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.character {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
}

.location {
  font-size: 12px;
  color: #888;
}

.details {
  font-size: 12px;
  color: #555;
}

.important {
  border-left: 5px solid red;
}

/* 全体イベント（黒） */
.time-event {
  background: #333;
  color: white;
  border-left: 5px solid #000;
  font-weight: bold;
}

.time-event .character {
  background: #000 !important;
  color: white;
}
</style>

</head>
<body>

<h1>タイムライン</h1>

<!-- ジャンプナビ -->
<div id="time-nav"></div>

<div class="timeline" id="timeline"></div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

  const container = document.getElementById('timeline');
  const nav = document.getElementById('time-nav');

  // キャラ色
  const colorMap = {};
  data.characters.forEach(c => {
    colorMap[c.name] = c.color;
  });

  const colorMapCSS = {
    "bg-red-500":"#ef4444",
    "bg-blue-500":"#3b82f6",
    "bg-yellow-500":"#eab308",
    "bg-orange-500":"#f97316",
    "bg-green-500":"#22c55e",
    "bg-purple-500":"#a855f7",
    "bg-gray-500":"#6b7280"
  };

  // 時間変換
  function convertTime(time) {
    let [h, m] = time.split(':').map(Number);
    if (h < 6) h += 24;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  // グループ化
  const groups = {};

  data.events.forEach(event => {
    const newTime = convertTime(event.time);
    if (!groups[newTime]) {
      groups[newTime] = [];
    }
    groups[newTime].push(event);
  });

  // ソート
  const sortedTimes = Object.keys(groups).sort();

  // ナビ生成
  sortedTimes.forEach(time => {
    const link = document.createElement('a');
    const safeId = "time-" + time.replace(":", "-");

    link.href = "#" + safeId;
    link.textContent = time;

    nav.appendChild(link);
  });

  // タイムライン生成
  sortedTimes.forEach(time => {

    const block = document.createElement('div');
    block.className = 'time-block';

    const safeId = "time-" + time.replace(":", "-");
    block.id = safeId;

    const header = document.createElement('div');
    header.className = 'time-header';
    header.textContent = time;

    block.appendChild(header);

    // 並び替え（全体を上に）
    groups[time]
      .sort((a, b) => {
        if (a.character === "全体") return -1;
        if (b.character === "全体") return 1;
        return 0;
      })
      .forEach(event => {

        const div = document.createElement('div');
        div.className = 'event';

        if(event.character === "全体") {
          div.classList.add('time-event');
        }

        if(event.isImportant) {
          div.classList.add('important');
        }

        const colorClass = colorMap[event.character] || "bg-gray-500";
        const color = colorMapCSS[colorClass] || "#999";

        const characterLabel = event.character === "全体"
          ? "全体情報"
          : event.character;

        div.innerHTML = `
          <div class="character" style="background:${color}">
            ${characterLabel}
          </div>
          <div class="location">${event.location}</div>
          <div>${event.action}</div>
          <div class="details">${event.details || ''}</div>
        `;

        block.appendChild(div);
      });

    container.appendChild(block);
  });

});
</script>

</body>
</html>
